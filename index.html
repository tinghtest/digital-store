<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Digital Product Store - Instant Delivery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}
h1{text-align:center;margin:20px 0;font-size:2em;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;max-width:1400px;margin:0 auto}
.card{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-4px);border-color:#6366f1}
.cat{display:inline-block;background:#334155;color:#94a3b8;padding:2px 10px;border-radius:20px;font-size:12px;margin-bottom:10px}
.card h3{color:#f1f5f9;margin-bottom:8px;font-size:18px}
.card p{color:#94a3b8;font-size:14px;margin-bottom:15px;min-height:40px}
.price{font-size:28px;font-weight:bold;color:#22c55e;margin-bottom:15px}
.email-input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;margin-bottom:10px;font-size:14px}
.buy-btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:16px;font-weight:bold;cursor:pointer}
.buy-btn:hover{opacity:.9}
.buy-btn:disabled{opacity:.5;cursor:wait}
.footer{text-align:center;margin-top:40px;color:#64748b;font-size:13px}
</style>
</head>
<body>
<h1>Digital Product Store</h1>
<p class="subtitle">Instant delivery after payment | Secure checkout via Stripe</p>
<div class="grid" id="grid"></div>
<div class="footer">

<p>Powered by Stripe | Auto-delivery via Email</p>
</div>

const STRIPE_KEY="pk_test_51Th5PBK71o0xpFrgjU6Z3D4Z3QqQ8Z3QqQ8Z3QqQ8Z3QqQ8Z3QqQ8Z3QqQ8Z3QqQ";
const API_BASE="https://store-api.example.com";
const grid=document.getElementById('grid');
PRODUCTS.forEach(p=>{
const c=document.createElement('div');c.className='card';
c.innerHTML=`<div class="cat">${p.cat}</div><h3>${p.name}</h3><p>${p.desc}</p><div class="price">$${p.price.toFixed(2)}</div><input type="email" id="email_${p.id}" placeholder="your@email.com" class="email-input"><button onclick="buy('${p.id}',${p.cents},'${p.name}')" class="buy-btn">Buy Now</button>`;

async function buy(id,cents,name){
const email=document.getElementById('email_'+id).value.trim();
if(!email){alert('Please enter your email');return;}
const btn=event.target;btn.disabled=true;btn.textContent='Processing...';
try{
const r=await fetch('https://api.stripe.com/v1/checkout/sessions',{
method:'POST',
headers:{'Authorization':'Bearer pk_test_51Th5PBK71o0xpFrgycR54aCUnng0c0N6Gcitjm1AzK3EMbWRlU5ZIsaUQedVmVlXeCvqPWh0QO3YkY90xzggfBrM00ai7VGVXB','Content-Type':'application/x-www-form-urlencoded'},
body:new URLSearchParams({
'mode':'payment',
'line_items[0][price_data][currency]':'usd',
'line_items[0][price_data][product_data][name]':name,
'line_items[0][price_data][unit_amount]':cents,
'line_items[0][quantity]':'1',
'success_url':window.location.origin+'/?success=1',
'cancel_url':window.location.origin+'/?cancel=1',
'customer_email':email,
'metadata[product_id]':id,
'metadata[email]':email
})
});
const data=await r.json();
if(data.url){window.location.href=data.url;}
else{alert('Error: '+(data.error?.message||'Unknown'));btn.disabled=false;btn.textContent='Buy Now';}
}catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Buy Now';}
}
</script>
